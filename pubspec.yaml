name: waheed
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.3
  get_it: ^9.2.1
  animate_do: ^4.2.0
  image_picker: ^1.2.1
  pin_code_fields: ^9.4.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.3
  lottie: ^3.3.1
  loading_animation_widget: ^1.3.0
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lotties/

  fonts:
    - family: IBM Plex Sans Arabic
      fonts:
        - asset: assets/fonts/ibm_thin.ttf
          weight: 100
        - asset: assets/fonts/ibm_extera_light.ttf
          weight: 200
        - asset: assets/fonts/ibm_light.ttf
          weight: 300
        - asset: assets/fonts/ibm_regular.ttf
          weight: 400
        - asset: assets/fonts/ibm_medium.ttf
          weight: 500
        - asset: assets/fonts/ibm_semi_bold.ttf
          weight: 600
        - asset: assets/fonts/ibm_bold.ttf
          weight: 700
